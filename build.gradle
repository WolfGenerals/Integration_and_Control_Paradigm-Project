plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.1.36'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // 排除开发用资源文件
    exclude("**/*.bbmodel")
    exclude("src/generated/**/.cache")
}

repositories {
    mavenCentral()
    maven {
        name = "Modrinth"
        url = "https://api.modrinth.com/maven"
    }
    maven {
        name = "CurseMaven"
        url = "https://www.cursemaven.com"
    }
    // BlameJared Maven（Veil 渲染引擎）
    maven {
        name = "BlameJared"
        url = "https://maven.blamejared.com"
    }
    // FlatDir 仍保留 libs/ 作为备选方案，优先从远程仓库获取
    flatDir {
        dirs 'libs'
    }
}

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21.1, so mods should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

// 如有需要可取消注释以启用访问转换器
// minecraft.accessTransformers.file rootProject.file('src/main/resources/META-INF/accesstransformer.cfg')

runs {
    configureEach {
        systemProperty 'forge.logging.markers', 'REGISTRIES'
        systemProperty 'forge.logging.console.level', 'debug'

        workingDirectory project.layout.projectDirectory.dir('run').dir(name)

        modSource project.sourceSets.main
    }

    client {
        // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    server {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        argument '--nogui'
    }

    // This run config launches GameTestServer and runs all registered gametests, then exits.
    // By default, the server will crash when no gametests are provided.
    // The gametest system is also enabled by default for other run configs under the /test command.
    gameTestServer {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    data {
        arguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    implementation "net.neoforged:neoforge:${neo_version}"

    // ================================================================
    //  远程 Maven 依赖（Modrinth / CurseMaven）
    //
    //  构建时自动从远程仓库下载，无需手动放置 JAR 文件。
    //  libs/ 目录仅作为离线回退或测试用途，不再提交到 Git。
    //
    //  create-aeronautics-bundled 是胖 JAR，内嵌了以下模块：
    //    - Sable (物理引擎 + Companion)
    //    - Offroad (轮胎、钻头)
    //    - Aeronautics (螺旋桨、浮空)
    //    - Simulated (SubLevel 系统)
    //  因此只需声明 bundled 即可覆盖全部 Simulated 生态依赖。
    //
    //  Create 也内嵌了 Flywheel、Ponder、Registrate，
    //  无需单独声明。
    // ================================================================
    implementation "maven.modrinth:create:6.0.10+mc1.21.1"
    implementation "maven.modrinth:create-aeronautics:1.2.1+mc1.21.1"
    implementation "maven.modrinth:sable:1.2.2+mc1.21.1"

    // Veil 渲染引擎（编译期依赖，运行时由 create-aeronautics-bundled 提供）
    // 排除 modrinth 和 fallenbreath 避免版本冲突
    compileOnly("foundry.veil:veil-neoforge-${minecraft_version}:4.1.4") {
        exclude group: "maven.modrinth"
        exclude group: "me.fallenbreath"
    }

    // 所有前置模组使用 JarJar 将依赖嵌套在 JAR 内（运行时 NeoForge 处理）。
    // compileClasspath 不含这些嵌套，导致 "程序包不存在"。
    // 这里在编译前提取所有 JarJar 嵌套包到 build/jarjar-deps/。
    def extractJarjars = tasks.register("extractJarjars") {
        outputs.dir(layout.buildDirectory.dir("jarjar-deps"))
        doLast {
            def outputDir = outputs.files.singleFile.toPath()
            if (java.nio.file.Files.exists(outputDir)) {
                java.nio.file.Files.walk(outputDir).sorted(java.util.Comparator.reverseOrder())
                    .forEach { java.nio.file.Files.deleteIfExists(it) }
            }
            java.nio.file.Files.createDirectories(outputDir)
            def home = System.getProperty("user.home")
            def cacheDir = new File("${home}/.gradle/caches/modules-2/files-2.1/maven.modrinth")
            if (!cacheDir.exists()) return
            cacheDir.eachFileRecurse { f ->
                if (f.name.endsWith(".jar")) {
                    def zf = new java.util.zip.ZipFile(f)
                    try {
                        def jarjarEntries = zf.entries().findAll { it.name.startsWith("META-INF/jarjar/") && it.name.endsWith(".jar") }
                        jarjarEntries.each { entry ->
                            def bytes = zf.getInputStream(entry).bytes
                            def nestedZis = new java.util.zip.ZipInputStream(new java.io.ByteArrayInputStream(bytes))
                            try {
                                def nestedEntry = nestedZis.nextEntry
                                while (nestedEntry != null) {
                                    if (!nestedEntry.isDirectory()) {
                                        def target = outputDir.resolve(nestedEntry.name)
                                        java.nio.file.Files.createDirectories(target.parent)
                                        java.nio.file.Files.copy(nestedZis, target, java.nio.file.StandardCopyOption.REPLACE_EXISTING)
                                    }
                                    nestedEntry = nestedZis.nextEntry
                                }
                            } finally { nestedZis.close() }
                        }
                    } finally { zf.close() }
                }
            }
        }
    }
    sourceSets.main.compileClasspath += files(extractJarjars.map { layout.buildDirectory.dir("jarjar-deps") })
    tasks.named("compileJava") { dependsOn(extractJarjars) }
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
// When "copyIdeResources" is enabled, this will also run before the game launches in IDE environments.
// See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
        maven {
            name = "Modrinth"
            url = "https://api.modrinth.com/maven"
        }
        maven {
            name = "CurseMaven"
            url = "https://www.cursemaven.com"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}


